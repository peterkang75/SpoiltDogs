<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="stylesheet" href="design-system.css">
<style>
  body { margin: 0; }

  .slide {
    width: 1080px;
    height: 1920px;
    display: flex;
    flex-direction: column;
    position: relative;
    background: var(--color-primary);
  }

  /* Background image fills top 60% */
  .hero-area {
    position: relative;
    height: 60%;
    overflow: hidden;
  }

  .hero-area img {
    width: 100%;
    height: 100%;
    object-fit: cover;
  }

  .hero-area .fade {
    position: absolute;
    bottom: 0;
    left: 0;
    right: 0;
    height: 200px;
    background: linear-gradient(to top, var(--color-primary) 0%, transparent 100%);
  }

  /* Content area */
  .content-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 0 var(--content-padding) var(--space-xl);
    gap: var(--space-md);
  }

  .promo-tag {
    display: inline-block;
    background: var(--color-accent);
    color: var(--color-primary);
    font-family: var(--font-body);
    font-weight: 700;
    font-size: var(--text-body);
    padding: 10px 32px;
    border-radius: 100px;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  .promo-heading {
    font-family: var(--font-heading);
    font-size: 64px;
    font-weight: 700;
    color: var(--color-text-light);
    line-height: var(--leading-tight);
  }

  .promo-body {
    font-family: var(--font-body);
    font-size: var(--text-body-lg);
    color: var(--color-text-light);
    opacity: 0.85;
    line-height: var(--leading-normal);
    max-width: 800px;
  }

  .cta-button {
    margin-top: var(--space-md);
    font-size: var(--text-body-lg);
    padding: var(--space-md) var(--space-xl);
  }

  /* Bottom brand */
  .brand-bottom {
    position: absolute;
    bottom: var(--space-lg);
    left: 50%;
    transform: translateX(-50%);
    text-align: center;
  }

  .brand-bottom .name {
    font-family: var(--font-heading);
    font-size: var(--text-body-lg);
    font-weight: 600;
    color: var(--color-accent);
  }
</style>
</head>
<body>
  <div class="slide">
    <div class="hero-area">
      <img src="{{imageUrl}}" alt="">
      <div class="fade"></div>
    </div>
    <div class="content-area">
      <div class="promo-tag">{{tag}}</div>
      <div class="promo-heading">{{heading}}</div>
      <div class="promo-body">{{body}}</div>
      <a class="cta-button cta-button--accent" href="#">{{ctaText}}</a>
    </div>
    <div class="brand-bottom">
      <div class="name">Spoilt Dogs</div>
    </div>
  </div>
</body>
</html>
